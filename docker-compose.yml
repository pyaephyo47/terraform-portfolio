services:
  frontend:
    build: .
    container_name: port-frontend
    ports:
      - "80:80"
    depends_on:
      - database

  database:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    container_name: port-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
