services:
  frontend:
    build: .
    container_name: capstone-frontend
    ports:
      - "80:80"
    depends_on:
      - database

  database:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    container_name: capstone-db
    environment:
      POSTGRES_USER: cloud_admin
      POSTGRES_PASSWORD: SecretSecurePassword123!
      POSTGRES_DB: terraform_portfolio
    ports:
      - "5432:5432"
